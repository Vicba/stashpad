name: Feature request
description: Suggest a new command, flag, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you're trying to solve and how Stash could help.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to accomplish?
      placeholder: e.g. I want to filter entries by multiple priorities at once
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? Include example commands if relevant
      placeholder: |
        stash entry list --priority high --priority medium
        # or
        stash entry list --priorities high,medium
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or tools you've thought about
      placeholder: e.g. piping `stash --json entry list` through jq
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI command or flag
        - Import / export
        - Storage / data model
        - Documentation / examples
        - Other
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: Would you like to contribute this?
      options:
        - label: I am willing to open a pull request for this feature
          required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: This feature fits Stash as a developer reference manager (not out of scope)
          required: true
        - label: I checked existing issues and PRs for similar requests
          required: true
